<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <!-- NOTE: To view this page, you must run it via a local web server (e.g., Live Server extension in VS Code, or python -m http.server) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              theme: "var(--theme-color)",
              customBg: "var(--bg-color)",
            },
            animation: {
              "fade-in": "fadeIn 0.3s ease-out",
              "zoom-in": "zoomIn 0.2s ease-out",
            },
            keyframes: {
              fadeIn: { "0%": { opacity: "0" }, "100%": { opacity: "1" } },
              zoomIn: {
                "0%": { transform: "scale(0.95)", opacity: "0" },
                "100%": { transform: "scale(1)", opacity: "1" },
              },
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        margin: 0;
        overflow: hidden;
        background-color: var(--bg-color);
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      :root {
        --theme-color: #f97316;
        --bg-color: #020617;
        --bg-rgb: 2, 6, 23;
        --widget-opacity: 0.8;
      }

      .bg-widget {
        background-color: rgba(var(--bg-rgb), var(--widget-opacity)) !important;
      }

      .tile-item.sortable-ghost {
        opacity: 0.2;
        transform: scale(0.9);
      }
      .tile-item.sortable-chosen {
        cursor: grabbing;
      }

      input[type="color"] {
        -webkit-appearance: none;
        appearance: none;
        border: none;
        width: 32px;
        height: 32px;
        padding: 0;
        cursor: pointer;
        background: none;
      }
      input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
      }
      input[type="color"]::-webkit-color-swatch {
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "lucide": "https://esm.sh/lucide@0.460.0",
          "sortablejs": "https://esm.sh/sortablejs@1.15.2",
          "react": "https://esm.sh/react@^19.2.3",
          "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
          "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
          "@dnd-kit/core": "https://esm.sh/@dnd-kit/core@^6.3.1",
          "@dnd-kit/sortable": "https://esm.sh/@dnd-kit/sortable@^10.0.0",
          "react/": "https://esm.sh/react@^19.2.3/",
          "@dnd-kit/utilities": "https://esm.sh/@dnd-kit/utilities@^3.2.2"
        }
      }
    </script>
    <!-- <link rel="stylesheet" href="/index.css" /> -->
  </head>
  <div class="flex flex-col items-center justify-center my-12 w-full max-w-2xl mx-auto px-4">
  <form id="search-form" class="relative w-full flex items-center bg-gray-800 rounded-xl shadow-2xl border border-gray-700 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all duration-200">
    
    <select id="engine-select" class="bg-gray-700 text-gray-200 text-sm px-4 py-3 rounded-l-xl outline-none border-r border-gray-600 cursor-pointer hover:bg-gray-600 transition">
      </select>

    <input 
      type="text" 
      id="search-input" 
      placeholder="Search the web..." 
      class="w-full bg-transparent text-white px-6 py-3 outline-none placeholder-gray-500"
      autocomplete="off"
    >
    
    <button type="submit" class="px-6 py-3 text-gray-400 hover:text-white transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
      </svg>
    </button>
  </form>
</div>
  <body class="transition-colors duration-500">
    <div id="app-root" class="h-screen w-screen overflow-hidden"></div>
    <div id="modal-root"></div>
    <script type="module" src="index.js"></script>
    <!-- <script type="module" src="/index.tsx"></script> //>
  </body>
</html>
